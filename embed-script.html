<style>
  #aq__content {
    width: 100%;
    /* height: 100vh; */
    display: flex;
    /* justify-content: center; */
    align-items: center;
    background-color: #f3f4f6;
  }
</style>
<div id="aq__content"></div>
<script>
  aqEmbedApiDoc("aq__content","https://ajoe-alex.github.io/accelq-api-doc-site/api/Project%20Configuration%20API/get-all-app-environments/?embed=true");

function aqEmbedApiDoc(targetId, docUrl) {
  if (!targetId || !docUrl) return;

  const container = document.getElementById(targetId);
  if (!container) return;

  const shadowRoot = container.attachShadow({ mode: "open" });

  showSpinner();

  fakeFetchCheck(docUrl, 5000)
    .then(() => loadIframe(docUrl))
    .catch(() => showBlockMessage());

  function fakeFetchCheck(url, timeout) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject("TIMEOUT"), timeout);

      fetch(url, { method: "GET", mode: "no-cors", cache: "no-store" })
        .then(res => {
          clearTimeout(timer);
          resolve(res);  // opaque OK
        })
        .catch(err => {
          clearTimeout(timer);
          reject(err);
        });
    });
  }

  function loadIframe(url) {
    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.loading = "lazy";
    iframe.allowFullscreen = true;
    iframe.allow = "clipboard-write";
    iframe.style.width = "100%";
    iframe.style.height = "0px";
    iframe.style.border = "1px solid #ffffff";

    // On load: only remove spinner, DO NOT remove+re-add iframe
    iframe.onload = () => {
      const spinner = shadowRoot.querySelector("#aq-spinner");
      if (spinner) spinner.remove(); // cleanly remove spinner
    };

    iframe.onerror = () => {
      showBlockMessage();
    };

    shadowRoot.appendChild(iframe);
  }

  function showSpinner() {
    const div = document.createElement("div");
    div.id = "aq-spinner";
    div.style.cssText = `
      width:100%;height:120px;display:flex;justify-content:center;align-items:center;
      font-family:sans-serif;font-size:14px;color:#444;
    `;
    div.innerHTML = `
      <div style="border:4px solid #f3f3f3;border-top:4px solid #3498db;
          border-radius:50%;width:32px;height:32px;
          animation:spin 1s linear infinite;"></div>
      <style>@keyframes spin {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}</style>
    `;
    shadowRoot.appendChild(div);
  }

  function showBlockMessage() {
    shadowRoot.innerHTML = `
      <div style="
        padding:16px;width:100%;
        border:1px solid #ddd;background:#fff8f2;
        font-family: sans-serif;color:#cc4500;
      ">
        <strong>API documentation is blocked by your network.</strong><br><br>
        Please request your IT team to whitelist the below URL pattern:<br>
        <code style="background:#eee;padding:2px 4px;border-radius:3px;margin-top:6px;display:inline-block;">
          https://*.github.io/*
        </code>
      </div>
    `;
  }

  window.addEventListener("message", (event) => {
    const data = event.data;
    if (data?.id !== "aq_content") return;
    const iframe = shadowRoot.querySelector("iframe");
    if (iframe && data?.type === "IFRAME_HEIGHT" && data?.url === iframe.src) {
      iframe.style.height = `${data.height}px`;
    }
  });
}
</script>
